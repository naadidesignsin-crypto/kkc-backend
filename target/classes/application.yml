server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: kkc-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/kkc_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

app:
  frontend-origin: ${FRONTEND_ORIGIN:http://localhost:5173}

razorpay:
  key-id: ${RAZORPAY_KEY_ID:rzp_test_replace_me}
  key-secret: ${RAZORPAY_KEY_SECRET:replace_me}
  webhook-secret: ${RAZORPAY_WEBHOOK_SECRET:replace_me}
