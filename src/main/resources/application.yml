server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: kkc-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/kkc_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

app:
  frontend-origin: ${FRONTEND_ORIGIN:http://localhost:5173}

razorpay:
  key-id: ${RAZORPAY_KEY_ID:rzp_test_replace_me}
  key-secret: ${RAZORPAY_KEY_SECRET:replace_me}
  webhook-secret: ${RAZORPAY_WEBHOOK_SECRET:replace_me}

kundli-api:
  base-url: ${KUNDLI_API_BASE_URL:https://kundliapi.com}
  api-key: ${KUNDLI_API_KEY:}
  astro-data-path: ${KUNDLI_ASTRO_DATA_PATH:/api/astro/get_astro_data}
